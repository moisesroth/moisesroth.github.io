<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moises Roth | Workspace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    background: #edf2f7;
    color: #16212e;
}

body.modal-open {
    overflow: hidden;
}

.app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
}

.sidebar {
    background: #0f1726;
    color: #e8efff;
    padding: 28px 22px;
    position: sticky;
    top: 0;
    height: 100vh;
}

.sidebar h1 {
    margin: 0 0 14px;
    font-size: 1.7rem;
}

.sidebar p {
    color: #9fb2cf;
    line-height: 1.7;
    margin: 0;
}

.sidebar a {
    color: #9bd0ff;
    text-decoration: none;
}

.navlist {
    margin: 26px 0;
    display: grid;
    gap: 10px;
}

.navbutton {
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.04);
    color: #dce8ff;
    font: inherit;
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
}

.navbutton:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(155,208,255,0.22);
}

.navbutton.is-active {
    background: rgba(155,208,255,0.16);
    border-color: rgba(155,208,255,0.28);
    color: #ffffff;
    transform: translateX(2px);
}

.meta {
    margin-top: 28px;
    display: grid;
    gap: 10px;
}

.meta div {
    border: 1px solid rgba(155,208,255,0.18);
    border-radius: 14px;
    padding: 12px;
}

.content {
    padding: 28px;
}

.hero {
    background: white;
    border-radius: 28px;
    padding: 28px;
    border: 1px solid #d9e3ef;
    margin-bottom: 20px;
}

.hero h2 {
    margin: 0 0 10px;
    font-size: clamp(2rem, 5vw, 3.8rem);
}

.hero p,
.section-head p,
.card p {
    color: #5c6b7d;
    line-height: 1.7;
}

.section {
    background: white;
    border: 1px solid #d9e3ef;
    border-radius: 24px;
    padding: 22px;
    margin-top: 16px;
    container-type: inline-size;
}

.section[hidden] {
    display: none;
}

.section-head {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 16px;
    align-items: center;
}

.section-head h3 {
    margin: 0;
    font-size: 1.25rem;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
}

.card {
    background: #f8fbfe;
    border: 1px solid #dbe5f0;
    border-radius: 18px;
    padding: 18px 18px 18px 20px;
    position: relative;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

.card:hover {
    border-color: #bdd0e4;
    box-shadow: 0 12px 24px rgba(22,33,46,0.08);
    transform: translateY(-2px);
}

.card-top {
    display: flex;
    gap: 8px;
    align-items: center;
}

.card-layout {
    display: block;
}

.card-layout.has-preview {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    gap: 18px;
    align-items: start;
}

.card-copy {
    min-width: 0;
}

.tag,
.badge-new {
    display: inline-flex;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 800;
}

.tag {
    background: #dcecff;
    color: #24558f;
}

.badge-new {
    background: #d8f5de;
    color: #1f6a30;
}

.card h3 {
    margin: 14px 0 10px;
    font-size: 1.02rem;
}

.card a {
    display: inline-block;
    margin-top: 18px;
    color: rgba(22, 33, 46, 0.36);
    font-weight: 700;
    text-decoration-thickness: 1px;
    transition: color 0.18s ease, opacity 0.18s ease;
    opacity: 0.6;
}

.card:hover a,
.card:focus-within a {
    color: #16212e;
    opacity: 1;
}

.card a:hover,
.card a:focus-visible {
    color: #0b5bd3;
    opacity: 1;
}

.card-preview {
    width: 100%;
    border: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
    text-align: left;
    display: block;
}

.card-preview-frame {
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #f1f6fb, #e5edf7);
    border: 1px solid #e3ebf4;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.card-preview-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top left;
    display: block;
    transform: scale(3);
    transform-origin: top left;
}

.preview-modal {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(15,23,38,0.74);
    backdrop-filter: blur(6px);
}

.preview-modal.is-open {
    display: flex;
}

.preview-modal-dialog {
    width: fit-content;
    max-width: min(1440px, calc(100vw - 48px));
    max-height: calc(100vh - 48px);
    overflow: auto;
    background: #ffffff;
    border-radius: 24px;
    border: 1px solid #d9e3ef;
    box-shadow: 0 24px 70px rgba(0,0,0,0.22);
}

.preview-modal-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    padding: 18px 20px 0;
}

.preview-modal-head h3 {
    margin: 0;
    font-size: 1.1rem;
}

.preview-modal-close {
    border: 0;
    background: #eff4f8;
    color: #16212e;
    border-radius: 999px;
    padding: 10px 14px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
}

.preview-modal-body {
    padding: 18px 20px 20px;
    overflow: auto;
    max-height: calc(100vh - 120px);
}

.preview-modal-body img {
    width: auto;
    max-width: none;
    height: auto;
    display: block;
    border-radius: 18px;
    border: 1px solid #e3ebf4;
}

@container (max-width: 1310px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

@container (max-width: 760px) {
    .card-layout.has-preview {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 960px) {
    .app {
        grid-template-columns: 1fr;
    }

    .sidebar {
        position: static;
        height: auto;
    }
}
</style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <h1>Moises Roth</h1>
        <p>Launch SailPoint, API, and productivity tools from one workspace.</p>
        <nav class="navlist" id="nav"></nav>
        <div class="meta">
            <div id="meta-current"></div>
            <div id="meta-total"></div>
        </div>
    </aside>
    <main class="content">
        <section class="hero">
            <h2 id="hero-title">Workspace</h2>
            <p id="hero-text">Select a category to load its apps.</p>
        </section>
        <div id="sections"></div>
    </main>
</div>
<div class="preview-modal" id="preview-modal" aria-hidden="true">
    <div class="preview-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="preview-modal-title">
        <div class="preview-modal-head">
            <h3 id="preview-modal-title">Preview</h3>
            <button type="button" class="preview-modal-close" id="preview-modal-close">Fechar</button>
        </div>
        <div class="preview-modal-body">
            <img id="preview-modal-image" alt="">
        </div>
    </div>
</div>
<script src="./portfolio-data.js"></script>
<script src="./shared.js"></script>
<script>
const nav = document.getElementById("nav");
const metaCurrent = document.getElementById("meta-current");
const metaTotal = document.getElementById("meta-total");
const sectionsRoot = document.getElementById("sections");
const heroTitle = document.getElementById("hero-title");
const heroText = document.getElementById("hero-text");
const previewModal = document.getElementById("preview-modal");
const previewModalTitle = document.getElementById("preview-modal-title");
const previewModalImage = document.getElementById("preview-modal-image");
const previewModalClose = document.getElementById("preview-modal-close");
let activePreviewCard = null;

metaTotal.textContent = `${PortfolioShared.stats.apps} apps disponiveis`;

sectionsRoot.innerHTML = PortfolioShared.sections.map((section, index) => `
    <section class="section" id="${section.id}" ${index === 0 ? "" : "hidden"}>
        <div class="section-head">
            <h3>${section.title}</h3>
            <p>${section.tone}</p>
        </div>
        <div class="grid">${section.items.map((item) => PortfolioShared.card(item)).join("")}</div>
    </section>
`).join("");

nav.innerHTML = PortfolioShared.sections.map((section, index) => `
    <button
        type="button"
        class="navbutton ${index === 0 ? "is-active" : ""}"
        data-target="${section.id}"
        aria-pressed="${index === 0 ? "true" : "false"}"
    >
        ${section.title}
    </button>
`).join("");

function activateSection(sectionId) {
    const activeSection = PortfolioShared.sections.find((section) => section.id === sectionId) || PortfolioShared.sections[0];

    document.querySelectorAll(".section").forEach((section) => {
        section.hidden = section.id !== activeSection.id;
    });

    document.querySelectorAll(".navbutton").forEach((button) => {
        const isActive = button.dataset.target === activeSection.id;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
    });

    heroTitle.textContent = activeSection.title;
    heroText.textContent = activeSection.tone;
    metaCurrent.textContent = `${activeSection.items.length} apps nesta area`;
    activePreviewCard = null;

    if (window.location.hash !== `#${activeSection.id}`) {
        history.replaceState(null, "", `#${activeSection.id}`);
    }
}

function openPreviewModal() {
    if (!activePreviewCard || !activePreviewCard.dataset.previewImage) return;
    previewModalTitle.textContent = activePreviewCard.dataset.previewTitle;
    previewModalImage.src = activePreviewCard.dataset.previewImage;
    previewModalImage.alt = activePreviewCard.dataset.previewLabel || activePreviewCard.dataset.previewTitle;
    previewModal.classList.add("is-open");
    previewModal.setAttribute("aria-hidden", "false");
    document.body.classList.add("modal-open");
}

function closePreviewModal() {
    previewModal.classList.remove("is-open");
    previewModal.setAttribute("aria-hidden", "true");
    previewModalImage.removeAttribute("src");
    previewModalImage.alt = "";
    document.body.classList.remove("modal-open");
}

nav.addEventListener("click", (event) => {
    const button = event.target.closest(".navbutton");
    if (!button) return;
    activateSection(button.dataset.target);
});

sectionsRoot.addEventListener("mouseover", (event) => {
    const card = event.target.closest(".card");
    if (!card) return;
    if (card.dataset.previewImage) {
        activePreviewCard = card;
    }
});

sectionsRoot.addEventListener("focusin", (event) => {
    const card = event.target.closest(".card");
    if (!card) return;
    if (card.dataset.previewImage) {
        activePreviewCard = card;
    }
});

previewModalClose.addEventListener("click", () => {
    closePreviewModal();
});

previewModal.addEventListener("click", (event) => {
    if (event.target === previewModal) {
        closePreviewModal();
    }
});

document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
        closePreviewModal();
    }
});

sectionsRoot.addEventListener("click", (event) => {
    if (event.target.closest(".card a")) return;
    const previewButton = event.target.closest(".card-preview");
    const card = event.target.closest(".card");
    if (!card || !card.dataset.previewImage) return;
    activePreviewCard = card;
    if (previewButton) {
        openPreviewModal();
    }
});

const initialSection = window.location.hash.replace("#", "");
activateSection(initialSection || PortfolioShared.sections[0].id);
</script>
</body>
</html>
